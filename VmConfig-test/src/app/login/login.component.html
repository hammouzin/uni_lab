<!-- Fond doux -->
<div class="min-vh-100 d-flex justify-content-center align-items-center bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg rounded-4 border-0">
          <div class="card-body p-5">

            <h3 class="text-center text-primary mb-4 fw-bold">🔐 Connexion</h3>
            <p class="text-center text-muted mb-4">Accédez à votre espace personnel</p>

            <form [formGroup]="data" (ngSubmit)="handleSubmit()">
              <div class="form-group mb-3">
                <label for="email" class="form-label text-dark">📧 Email</label>
                <input
                  type="email"
                  class="form-control rounded-3 shadow-sm"
                  id="email"
                  placeholder="ex: zineb@example.com"
                  formControlName="userId"
                />
              </div>

              <div class="form-group mb-4">
                <label for="password" class="form-label text-dark">🔒 Mot de passe</label>
                <input
                  type="password"
                  class="form-control rounded-3 shadow-sm"
                  id="password"
                  placeholder="Mot de passe secret"
                  formControlName="password"
                />
              </div>

              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary rounded-pill fw-semibold py-2">
                  Se connecter
                </button>
              </div>
            </form>

            <div class="text-center mt-3">
              <a routerLink="/register" class="text-decoration-none text-primary">
                👉 Vous n'avez pas de compte ? Créez-en un
              </a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
