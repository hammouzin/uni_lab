<div class="container py-4">
  <h2 class="mb-4 text-primary text-center">Liste des Machines Virtuelles</h2>

  <!-- Boutons -->
  <div class="d-flex justify-content-between mb-3">
    <button class="btn btn-primary" (click)="toggleAddVm()">
      {{ showAddVmForm ? 'Annuler' : '➕ Ajouter une VM' }}
    </button>

    <button class="btn btn-success" (click)="loadVMs()" *ngIf="!showList">
      📄 Afficher la liste
    </button>
  </div>

  <!-- Formulaire d'ajout -->
  <app-add-vm *ngIf="showAddVmForm" (vmCreated)="onVmCreated()"></app-add-vm>

  <!-- Message si vide -->
  <div *ngIf="showList && vms.length === 0" class="alert alert-info">
    Aucune machine virtuelle disponible.
  </div>

  <!-- Tableau -->
 <ng-container *ngFor="let vm of vms">
  <tr>
    <td>{{ vm.name }}</td>
    <td>{{ vm.cores }}</td>
    <td>{{ vm.sockets }}</td>
    <td>{{ vm.memory }}</td>
    <td>{{ vm.diskSize }}</td>
    <td>{{ vm.iso }}</td>
    <td class="text-center">
      <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-sm btn-primary" (click)="openConsole(vm)" [disabled]="loadingConsole[vm.name]">
          {{ loadingConsole[vm.name] ? 'Ouverture...' : 'Configurer' }}
        </button>
        <button class="btn btn-sm btn-danger" (click)="deleteVM(vm.id)">🗑️ Supprimer</button>
      </div>
    </td>
  </tr>

  <tr *ngIf="showConsole[vm.name]">
    <td colspan="7">
      <div [id]="'vnc-' + sanitizeId(vm.name)" style="width: 100%; height: 500px; border: 1px solid #ccc;"></div>
      <button class="btn btn-sm btn-warning mt-2" (click)="closeConsole(vm)">❌ Fermer la console</button>
    </td>
  </tr>
</ng-container>

</div>
